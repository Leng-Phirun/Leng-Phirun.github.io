<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Matrix Rain</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0;overflow:hidden}
.wrap{position:relative;height:260px}
canvas{position:absolute;inset:0;width:100%;height:100%}
.overlay{position:absolute;inset:0;padding:20px 24px;z-index:2;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.title{font-size:11px;color:#00ff88;letter-spacing:1.5px;text-transform:uppercase}
.spec{font-size:10px;color:#888;line-height:1.7;background:rgba(10,10,10,0.7);padding:8px 10px;border:1px solid #222;border-radius:6px;backdrop-filter:blur(4px);max-width:340px}
.spec b{color:#00ff88}
</style></head><body><div class="wrap">
<canvas id="c"></canvas>
<div class="overlay">
  <div class="title">// Matrix Rain — optional brand motif</div>
  <div class="spec">
    <div><b>Usage:</b> hero section only. Never behind reading content.</div>
    <div><b>Opacity:</b> 0.22 over <code>#0a0a0a</code></div>
    <div><b>Char set:</b> katakana + 0–9 + hex</div>
    <div><b>Fade:</b> leading char is <code>#ccffdd</code>, trail <code>#00ff88</code></div>
  </div>
</div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
function fit(){cv.width=cv.clientWidth;cv.height=cv.clientHeight}
fit();addEventListener('resize',fit);
const chars='アイウエオカキクケコサシスセソ0123456789abcdef';
const fs=14;let cols=Math.floor(cv.width/fs);let drops=Array(cols).fill(1);
function frame(){
  ctx.fillStyle='rgba(10,10,10,0.08)';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.font=fs+"px 'JetBrains Mono',monospace";
  for(let i=0;i<drops.length;i++){
    const ch=chars[Math.floor(Math.random()*chars.length)];
    const y=drops[i]*fs;
    ctx.fillStyle=y<30?'#ccffdd':'#00ff88';
    ctx.globalAlpha=0.6;
    ctx.fillText(ch,i*fs,y);
    if(y>cv.height&&Math.random()>0.975)drops[i]=0;
    drops[i]++;
  }
}
setInterval(frame,55);
</script>
</body></html>
