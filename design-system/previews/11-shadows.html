<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Shadows</title>
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0}
.wrap{padding:30px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{background:#161616;border:1px solid #222;border-radius:12px;height:100px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#888}
.card.hover{border-color:#00cc6a;box-shadow:0 8px 32px rgba(0,255,136,0.15)}
.card.btn{border-color:#00ff88;box-shadow:0 0 20px rgba(0,255,136,0.15);background:transparent;color:#00ff88}
.card.node{border-color:#00ff88;box-shadow:0 0 10px rgba(0,255,136,0.15);background:#00ff88;color:#0a0a0a;font-weight:700}
.tok{font-size:10px;color:#00ff88;margin-top:6px;text-align:center;display:block}
</style></head><body><div class="wrap">
<div><div class="card hover">card hover</div><span class="tok">0 8px 32px glow</span></div>
<div><div class="card btn">button halo</div><span class="tok">0 0 20px glow</span></div>
<div><div class="card node">node · active</div><span class="tok">0 0 10px glow</span></div>
</div></body></html>
