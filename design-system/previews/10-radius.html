<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Radius</title>
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0}
.wrap{padding:24px;display:flex;gap:18px;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.sq{width:60px;height:60px;background:#161616;border:1px solid #222}
.tok{color:#00ff88;font-size:10px}
.val{color:#888;font-size:10px}
.use{color:#e0e0e0;font-size:10px}
</style></head><body><div class="wrap">
<div class="item"><div class="sq" style="border-radius:2px"></div><div class="tok">r-xs</div><div class="val">2px</div><div class="use">thin hairlines</div></div>
<div class="item"><div class="sq" style="border-radius:3px"></div><div class="tok">r-sm</div><div class="val">3px</div><div class="use">chips · tags</div></div>
<div class="item"><div class="sq" style="border-radius:4px"></div><div class="tok">r-md</div><div class="val">4px</div><div class="use">buttons</div></div>
<div class="item"><div class="sq" style="border-radius:8px"></div><div class="tok">r-lg</div><div class="val">8px</div><div class="use">contact pills</div></div>
<div class="item"><div class="sq" style="border-radius:12px"></div><div class="tok">r-xl</div><div class="val">12px</div><div class="use">cards</div></div>
<div class="item"><div class="sq" style="border-radius:50%"></div><div class="tok">r-pill</div><div class="val">50%</div><div class="use">timeline · FAB</div></div>
</div></body></html>
