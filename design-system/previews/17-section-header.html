<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Section Header</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;background:#0a0a0a;font-family:'Inter',sans-serif;color:#e0e0e0}
.wrap{padding:32px;display:flex;flex-direction:column;gap:24px}
.sh h2{margin:0 0 8px;font-size:30px;font-weight:700}
.sh h2 .hash{color:#00ff88;font-family:'JetBrains Mono',monospace}
.sh .line{width:60px;height:3px;background:linear-gradient(90deg,#00ff88,#00cc6a);border-radius:2px}
.cap{font-family:'JetBrains Mono',monospace;font-size:11px;color:#666;margin-top:6px}
</style></head><body><div class="wrap">
<div class="sh"><h2><span class="hash">#</span> Skills</h2><div class="line"></div><div class="cap">pattern: mono # + Inter 700 + 60×3px gradient underline</div></div>
<div class="sh"><h2><span class="hash">#</span> Experience</h2><div class="line"></div></div>
</div></body></html>
