<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Headings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; background:#0a0a0a; font-family:'Inter',sans-serif; color:#e0e0e0; overflow:hidden; }
  .stage { position:relative; height:100%; padding:18px 24px; }
  .stage::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(circle at -10% 110%, rgba(0,255,136,0.22) 0%, transparent 45%),
      radial-gradient(circle at 110% -10%, rgba(0,255,136,0.10) 0%, transparent 45%);
    pointer-events:none;
  }

  .grid { position:relative; display:grid; grid-template-columns: 1fr 1fr; gap:14px 22px; align-items:stretch; }

  /* BIG DISPLAY SPECIMEN — dominant */
  .big {
    position:relative;
    grid-column: 1 / -1;
    padding: 6px 0 12px;
    display:flex; align-items:baseline; gap:18px;
    border-bottom: 1px solid #1a1a1a;
  }
  .big .num {
    font-family:'JetBrains Mono',monospace; font-size:10px; color:#00ff88;
    writing-mode: vertical-rl; transform: rotate(180deg);
    letter-spacing: 3px; text-transform:uppercase; opacity:0.75;
    padding-top:8px;
  }
  .big h1 {
    font-family:'Inter',sans-serif; font-weight:900; font-size:96px;
    line-height:0.88; letter-spacing:-4px; margin:0;
    color:#fff;
  }
  .big h1 em {
    font-style:normal; color:#00ff88;
    position:relative;
  }
  .big h1 em::after{
    content:''; position:absolute; left:0; right:0; bottom:8px; height:10px;
    background:#00ff88; opacity:0.22; z-index:-1;
  }
  .big .cursor{
    display:inline-block; width:14px; height:0.7em; background:#00ff88;
    vertical-align:-2px; margin-left:6px; animation:bl 1.1s step-end infinite;
  }
  @keyframes bl{50%{opacity:0}}
  .big .sidebar{
    margin-left:auto; display:flex; flex-direction:column; gap:4px;
    font-family:'JetBrains Mono',monospace; font-size:10px; color:#666;
    text-align:right; padding-bottom:4px;
  }
  .big .sidebar strong{color:#00ff88;font-weight:500}

  /* SUPPORTING SPECS */
  .spec{ position:relative; }
  .spec .tag{
    font-family:'JetBrains Mono',monospace; font-size:9px; color:#00ff88;
    letter-spacing:1.6px; text-transform:uppercase; margin-bottom:6px;
    display:flex; gap:6px; align-items:center;
  }
  .spec .tag::before{ content:''; width:6px; height:6px; background:#00ff88; border-radius:50%; box-shadow:0 0 8px #00ff88; }
  .spec .sz{ font-family:'JetBrains Mono',monospace; font-size:10px; color:#555; margin-top:4px; }

  .h2{ font-size:30px; font-weight:800; letter-spacing:-0.8px; line-height:1.05; margin:0; }
  .h2 .hash{ color:#00ff88; font-family:'JetBrains Mono',monospace; margin-right:2px; font-weight:700;}
  .underline{ margin-top:6px; width:48px; height:3px; border-radius:2px; background:linear-gradient(90deg,#00ff88,#00cc6a); }

  .h3-mono{ font-family:'JetBrains Mono',monospace; font-size:16px; color:#00ff88; margin:0; }
  .h3-mono .c{ color:#00cc6a; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid">

    <div class="big">
      <div class="num">display</div>
      <h1>Leng<br><em>Phirun</em><span class="cursor"></span></h1>
      <div class="sidebar">
        <span><strong>Inter 900</strong></span>
        <span>96 / 0.88</span>
        <span>-4px tracking</span>
        <span>accent underlay</span>
      </div>
    </div>

    <div class="spec">
      <div class="tag">h2 · section</div>
      <h2 class="h2"><span class="hash">#</span>About Me</h2>
      <div class="underline"></div>
      <div class="sz">Inter 800 · 30 / 1.05 · -0.8</div>
    </div>

    <div class="spec">
      <div class="tag">h3 · mono card</div>
      <div class="h3-mono"><span class="c">//</span> VAPT &amp; Red Teaming</div>
      <div class="sz">JetBrains Mono 500 · 16 · accent</div>
    </div>

  </div>
</div>
</body>
</html>
