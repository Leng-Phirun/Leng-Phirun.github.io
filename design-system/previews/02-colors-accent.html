<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Accent scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:#0a0a0a; font-family:'JetBrains Mono',monospace; color:#e0e0e0; }
  .wrap { padding:20px; display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .sw { display:flex; flex-direction:column; gap:4px; }
  .chip { height:80px; border-radius:4px; border:1px solid #222; position:relative; }
  .chip.glow { background:#0a0a0a; box-shadow: inset 0 0 40px rgba(0,255,136,0.15); }
  .chip.tint { background:rgba(0,255,136,0.15); }
  .name { font-size:11px; color:#e0e0e0; }
  .val  { font-size:10px; color:#888; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#00ff88"></div><div class="name" style="color:#00ff88">accent</div><div class="val">#00ff88</div></div>
  <div class="sw"><div class="chip" style="background:#00cc6a"></div><div class="name" style="color:#00cc6a">accent-dim</div><div class="val">#00cc6a</div></div>
  <div class="sw"><div class="chip tint"></div><div class="name">accent-glow</div><div class="val">rgba(0,255,136,0.15)</div></div>
  <div class="sw"><div class="chip glow"></div><div class="name">glow halo</div><div class="val">box-shadow inset</div></div>
</div>
</body>
</html>
