<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0;font-size:13px}
.wrap{padding:18px 26px}
.t{line-height:1.75}
.prompt{color:#888}
.user{color:#00ff88}
.ok{color:#00ff88}
.info{color:#e0e0e0}
.dim{color:#666}
.cursor{display:inline-block;width:8px;height:14px;background:#00ff88;margin-left:4px;vertical-align:-2px;animation:b 1s step-end infinite}
@keyframes b{50%{opacity:0}}
</style></head><body><div class="wrap">
<div class="t"><span class="user">phirun</span><span class="dim">@</span><span class="user">adversary</span><span class="dim">:~$</span> <span class="info">certs --list</span></div>
<div class="t"><span class="ok">[+]</span> <span class="info">OSCP</span> <span class="dim">········</span> <span class="user">OffSec</span></div>
<div class="t"><span class="ok">[+]</span> <span class="info">CRTA</span> <span class="dim">········</span> <span class="user">CyberWarFare Labs</span> <span class="dim">· 2025-11</span></div>
<div class="t"><span class="ok">[+]</span> <span class="info">CREST CRT</span> <span class="dim">···</span> <span class="user">CREST</span> <span class="dim">· 2025-08</span></div>
<div class="t"><span class="ok">[+]</span> <span class="info">CREST CPSA</span> <span class="dim">··</span> <span class="user">CREST</span> <span class="dim">· 2025-08</span></div>
<div class="t"><span class="user">phirun</span><span class="dim">@</span><span class="user">adversary</span><span class="dim">:~$</span> <span class="info">_</span><span class="cursor"></span></div>
</div></body></html>
