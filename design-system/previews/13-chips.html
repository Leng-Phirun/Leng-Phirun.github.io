<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Chips</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0}
.wrap{padding:24px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.lbl{font-size:10px;color:#888;min-width:100px}
.skill-tag{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.2);color:#e0e0e0;padding:5px 12px;border-radius:3px;font-size:12px;font-family:'JetBrains Mono',monospace}
.tech{font-family:'JetBrains Mono',monospace;font-size:12px;color:#888;background:#111;padding:4px 8px;border-radius:3px}
.proj-type{font-family:'JetBrains Mono',monospace;font-size:11px;color:#00ff88;background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.2);padding:3px 10px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px}
.status{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,255,136,0.15);color:#00ff88;border:1px solid rgba(0,255,136,0.3);padding:4px 12px;border-radius:3px}
</style></head><body><div class="wrap">
<div class="row"><span class="lbl">skill-tag</span><span class="skill-tag">Network Pentesting</span><span class="skill-tag">Active Directory</span><span class="skill-tag">OWASP Top 10</span></div>
<div class="row"><span class="lbl">tech-tag</span><span class="tech">VAPT</span><span class="tech">Red Team</span><span class="tech">AD</span><span class="tech">Python</span></div>
<div class="row"><span class="lbl">project-type</span><span class="proj-type">TOOL</span><span class="proj-type">WRITEUP</span><span class="proj-type">RESEARCH</span></div>
<div class="row"><span class="lbl">status</span><span class="status">Certified</span><span class="status">Aug 2025</span></div>
</div></body></html>
