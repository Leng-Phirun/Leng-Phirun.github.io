<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Iconography</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0}
.wrap{padding:22px 28px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lbl{font-size:10px;color:#888;min-width:90px}
.icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;color:#00ff88}
.brand svg{width:24px;height:24px;fill:currentColor}
.ui svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.note{font-size:10px;color:#666}
</style></head><body><div class="wrap">
