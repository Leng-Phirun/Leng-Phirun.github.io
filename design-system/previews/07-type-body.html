<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Body</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; background:#0a0a0a; font-family:'Inter',sans-serif; color:#e0e0e0; line-height:1.6; }
  .wrap { padding:24px; display:flex; flex-direction:column; gap:14px; }
  .p { font-size:16px; color:#888; margin:0; max-width:560px; }
  .tag { font-family:'JetBrains Mono',monospace; font-size:13px; color:#e0e0e0; }
  .dim { color:#888; }
  .spec { font-family:'JetBrains Mono',monospace; font-size:11px; color:#444; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <p class="p">I am an Assistant Lead (Adversary) at Veilron Technologies with over 3 years of hands-on experience in the cybersecurity field.</p>
    <div class="spec" style="margin-top:6px">body · Inter 400 · 16px · color #888 · line-height 1.6</div>
  </div>
  <div>
    <span class="tag">root@phirun</span><span class="dim tag">:</span><span class="tag" style="color:#00ff88">~$</span> <span class="dim tag">whoami</span>
    <div class="spec" style="margin-top:6px">mono · JetBrains Mono 400 · 13px · terminal prompt voice</div>
  </div>
</div>
</body>
</html>
