<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Spacing scale</title>
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0}
.wrap{padding:20px 24px;display:grid;grid-template-columns:60px 1fr 80px;gap:10px 16px;align-items:center}
.tok{color:#00ff88;font-size:11px}
.bar{height:14px;background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.3);border-radius:2px}
.val{font-size:11px;color:#888;text-align:right}
</style></head><body><div class="wrap">
<div class="tok">sp-1</div><div><div class="bar" style="width:4px"></div></div><div class="val">0.25rem · 4px</div>
<div class="tok">sp-2</div><div><div class="bar" style="width:8px"></div></div><div class="val">0.5rem · 8px</div>
<div class="tok">sp-3</div><div><div class="bar" style="width:12px"></div></div><div class="val">0.75rem · 12px</div>
<div class="tok">sp-4</div><div><div class="bar" style="width:16px"></div></div><div class="val">1rem · 16px</div>
<div class="tok">sp-5</div><div><div class="bar" style="width:24px"></div></div><div class="val">1.5rem · 24px</div>
<div class="tok">sp-6</div><div><div class="bar" style="width:32px"></div></div><div class="val">2rem · 32px</div>
<div class="tok">sp-7</div><div><div class="bar" style="width:40px"></div></div><div class="val">2.5rem · 40px</div>
<div class="tok">sp-8</div><div><div class="bar" style="width:48px"></div></div><div class="val">3rem · 48px</div>
<div class="tok">sp-10</div><div><div class="bar" style="width:80px"></div></div><div class="val">5rem · 80px</div>
</div></body></html>
