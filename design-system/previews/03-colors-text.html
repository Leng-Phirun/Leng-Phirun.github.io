<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Text</title>
<style>
  html,body { margin:0; background:#0a0a0a; font-family:'Inter',sans-serif; color:#e0e0e0; }
  .wrap { padding:24px; display:flex; flex-direction:column; gap:12px; }
  .row { display:flex; align-items:center; gap:16px; }
  .sw { width:48px; height:48px; border-radius:4px; border:1px solid #222; flex:none; }
  .meta { display:flex; flex-direction:column; }
  .name { font-size:13px; }
  .val  { font-family:'JetBrains Mono',monospace; font-size:11px; color:#888; }
  .spec { font-size:12px; color:#888; margin-left:auto; font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#e0e0e0"></div>
    <div class="meta"><div class="name" style="color:#e0e0e0">text-primary</div><div class="val">#e0e0e0</div></div>
    <div class="spec">body copy · h1 / h2 / h3</div>
  </div>
  <div class="row">
    <div class="sw" style="background:#888888"></div>
    <div class="meta"><div class="name" style="color:#888888">text-secondary</div><div class="val">#888888</div></div>
    <div class="spec">captions · labels · meta</div>
  </div>
  <div class="row">
    <div class="sw" style="background:#00ff88"></div>
    <div class="meta"><div class="name" style="color:#00ff88">accent (on text)</div><div class="val">#00ff88</div></div>
    <div class="spec">links · prompts · emphasis</div>
  </div>
</div>
</body>
</html>
