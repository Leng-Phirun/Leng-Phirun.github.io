<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Scale ramp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; background:#0a0a0a; font-family:'Inter',sans-serif; color:#e0e0e0; }
  .wrap { padding:20px 24px; display:grid; grid-template-columns: 80px 1fr 120px; gap:8px 16px; align-items:baseline; }
  .token { font-family:'JetBrains Mono',monospace; font-size:11px; color:#00ff88; }
  .sample { color:#e0e0e0; }
  .px { font-family:'JetBrains Mono',monospace; font-size:11px; color:#888; text-align:right; }
</style>
</head>
<body>
<div class="wrap">
  <div class="token">--fs-hero</div>  <div class="sample" style="font-size:56px;font-weight:700;letter-spacing:-1px">Aa</div> <div class="px">3.5rem · 56px</div>
  <div class="token">--fs-3xl</div>   <div class="sample" style="font-size:32px;font-weight:700">Aa</div> <div class="px">2rem · 32px</div>
  <div class="token">--fs-2xl</div>   <div class="sample" style="font-size:22px;font-weight:600">Aa</div> <div class="px">1.4rem · 22px</div>
  <div class="token">--fs-xl</div>    <div class="sample" style="font-size:18px">Aa</div> <div class="px">1.15rem · 18px</div>
  <div class="token">--fs-lg</div>    <div class="sample" style="font-size:16px">Aa</div> <div class="px">1rem · 16px</div>
  <div class="token">--fs-md</div>    <div class="sample" style="font-size:14px;color:#888">Aa</div> <div class="px">0.9rem · 14px</div>
  <div class="token">--fs-xs</div>    <div class="sample" style="font-size:11px;font-family:'JetBrains Mono',monospace;color:#00ff88;text-transform:uppercase;letter-spacing:0.5px">Aa</div> <div class="px">0.7rem · 11px</div>
</div>
</body>
</html>
