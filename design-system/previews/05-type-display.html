<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; background:#0a0a0a; font-family:'Inter',sans-serif; color:#e0e0e0; overflow:hidden; }
  .wrap { padding:28px 32px; position:relative; }
  .wrap::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 15% 60%, rgba(0,255,136,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 95% 20%, rgba(0,255,136,0.06) 0%, transparent 55%);
    pointer-events:none;
  }
  .prompt {
    font-family:'JetBrains Mono',monospace;
    font-size:12px; color:#00ff88; opacity:0.85;
    margin:0 0 4px; position:relative;
  }
  .h1 {
    font-size:64px; font-weight:700; letter-spacing:-1.5px; line-height:1; margin:0;
    color:#e0e0e0; position:relative;
  }
  .h1 em {
    font-style:normal; color:#00ff88; position:relative;
  }
  .cursor {
    display:inline-block; width:10px; height:0.75em; background:#00ff88;
    margin-left:6px; vertical-align:-2px; animation:blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity:0; } }
  .meta {
    font-family:'JetBrains Mono',monospace; font-size:11px; color:#666;
    margin-top:14px; position:relative; display:flex; gap:14px;
  }
  .meta .tok { color:#00ff88; }
</style>
</head>
<body>
<div class="wrap">
  <p class="prompt">$ whoami</p>
  <h1 class="h1">Leng <em>Phirun</em><span class="cursor"></span></h1>
  <div class="meta">
    <span><span class="tok">Inter</span> 700</span>
    <span><span class="tok">64px</span> / 1.0</span>
    <span><span class="tok">-1.5px</span> tracking</span>
    <span><span class="tok">em</span> → accent</span>
  </div>
</div>
</body>
</html>
