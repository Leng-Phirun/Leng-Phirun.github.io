<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Background</title>
<style>
html,body{margin:0;background:#0a0a0a;font-family:'JetBrains Mono',monospace;color:#e0e0e0;overflow:hidden}
.wrap{position:relative;padding:22px 28px;min-height:180px}
.wrap::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.15) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 50%, rgba(0,255,136,0.05) 0%, transparent 50%);pointer-events:none}
.rel{position:relative}
.note{font-size:10px;color:#888;margin-bottom:8px}
.tok{color:#00ff88;font-size:11px}
code{background:#111;padding:2px 6px;border-radius:3px;color:#e0e0e0;font-size:11px}
</style></head><body><div class="wrap"><div class="rel">
<div class="note" style="margin-bottom:14px">Only ornamental background in the system — used on hero only.</div>
<div style="display:flex;flex-direction:column;gap:6px;font-size:11px;color:#888">
  <div><span class="tok">1.</span> ellipse at 20% 50% — <code>rgba(0,255,136,0.15)</code> → transparent 50%</div>
  <div><span class="tok">2.</span> ellipse at 80% 50% — <code>rgba(0,255,136,0.05)</code> → transparent 50%</div>
  <div style="margin-top:10px;color:#666">everywhere else: flat <code>#0a0a0a</code>. No patterns, no grain.</div>
</div>
</div></div></body></html>
